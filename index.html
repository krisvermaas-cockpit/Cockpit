<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cockpit - Rust & Focus</title>
    <style>
        :root {
            --gemini-bg: #f0f4f9;
            --gemini-card: #ffffff;
            --gemini-accent: #1a73e8;
            --text-main: #1f1f1f;
            --text-muted: #5f6368;
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Google Sans', 'SF Pro Text', Roboto, sans-serif;
            margin: 0;
            background-color: var(--gemini-bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar & Mobiele navigatie */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0,0,0,0.05);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .brand { font-size: 1.5rem; font-weight: 600; color: var(--gemini-accent); display: flex; justify-content: space-between; align-items: center; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { padding: 20px !important; }
            .dashboard-grid { grid-template-columns: 1fr !important; }
            .mobile-toggle { display: block !important; }
        }

        .mobile-toggle { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; }

        .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .role-tile {
            background: var(--gemini-card); border: 1px solid #e3e3e3; border-radius: 16px;
            padding: 12px; text-align: center; cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
        }
        .role-tile.active { background: #d3e3fd; border-color: var(--gemini-accent); font-weight: 500; }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 800px; margin-bottom: 30px; }

        .prompt-box {
            background: var(--gemini-card); border-radius: 28px; padding: 16px 24px;
            box-shadow: 0 1px 6px rgba(32,33,36,0.1); width: 100%; max-width: 800px;
            display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;
        }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; width: 100%; max-width: 800px; }
        .glass-card { background: var(--gemini-card); border-radius: 24px; padding: 24px; border: 1px solid #e3e3e3; }
        
        ul { list-style: none; padding: 0; }
        li { padding: 12px 0; border-bottom: 1px solid #f1f3f4; display: flex; justify-content: space-between; align-items: center; }

        .complete-btn {
            background: white; border: 1px solid #dadce0; color: #1a73e8;
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .goal-item { background: #f8f9fa; padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid var(--gemini-accent); cursor: pointer; }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <div class="brand">
            Cockpit
            <button class="mobile-toggle" onclick="toggleMenu()">✕</button>
        </div>
        
        <div class="role-grid">
            <div class="role-tile" data-role="Gezondheid">🥗<br>Health</div>
            <div class="role-tile" data-role="Werk">💼<br>Werk</div>
            <div class="role-tile" data-role="Thuis">🏠<br>Thuis</div>
            <div class="role-tile" data-role="CommunitySocial">🌱<br>Sociaal</div>
        </div>

        <div id="goals-section" style="display: none;">
            <div style="font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 10px;">Ontwikkeldoelen</div>
            <div id="goals-list"></div>
            <button onclick="triggerNewGoal()" style="width:100%; border:1px dashed #ccc; background:none; padding:8px; border-radius:8px; cursor:pointer;">+ Nieuw Doel</button>
        </div>

        <div id="project-section">
            <div style="font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 10px;">Projecten</div>
            <div id="projectTree"></div>
        </div>
    </nav>

    <main class="main-content">
        <div style="width: 100%; max-width: 800px; display: flex; align-items: center; gap: 15px;">
            <button class="mobile-toggle" onclick="toggleMenu()" style="display: block;">☰</button>
            <h1>Focus, <span style="color: var(--gemini-accent);">Kris</span></h1>
        </div>

        <div class="prompt-box">
            <div style="display:flex; align-items:center; gap:10px;">
                <input id="taskInput" placeholder="Wat ga je doen?" style="flex:1; border:none; outline:none; font-size:1.1rem;">
                <button onclick="addTask()" style="background:var(--gemini-accent); color:white; border:none; border-radius:50%; width:36px; height:36px; cursor:pointer;">➔</button>
            </div>
            <div style="display:flex; gap:10px; border-top:1px solid #eee; padding-top:10px;">
                <select id="roleSelect" style="border-radius:15px; border:1px solid #eee; padding:5px 10px;">
                    <option value="Werk">Werk</option>
                    <option value="Thuis">Thuis</option>
                    <option value="Gezondheid">Health</option>
                    <option value="CommunitySocial">Sociaal</option>
                </select>
                <input id="dateInput" placeholder="Wanneer?" style="border-radius:15px; border:1px solid #eee; padding:5px 10px; flex:1;">
            </div>
        </div>

        <div class="dashboard-grid">
            <section class="glass-card">
                <h2>Vandaag ✨</h2>
                <ul id="today-list"></ul>
            </section>
            <section class="glass-card">
                <h2>Inbox 📥</h2>
                <ul id="list"></ul>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const supabaseClient = supabase.createClient(
            "https://fgogcqowvnymnpuvxdee.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnb2djcW93dm55bW5wdXZ4ZGVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MTA1NTksImV4cCI6MjA4NjM4NjU1OX0.pQkqm6JOyv6mbxn-gl00HDCG0uahRziwhX3tcIaaqhA"
        );

        let activeProjectId = null;
        let activeRoles = [];

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        function formatDateLocalISO(date) {
            return date.toISOString().split('T')[0];
        }

        // --- Data laden ---
        async function refreshAll() {
            loadTodayTasks();
            loadTasks();
            loadSidebarProjects();
        }

        async function loadTodayTasks() {
            const today = formatDateLocalISO(new Date());
            const { data } = await supabaseClient.from('inbox_items').select('*').lte('planned_for', today).neq('status', 'done');
            const list = document.getElementById('today-list');
            list.innerHTML = (data || []).map(t => `<li><div><strong>${t.verb}</strong> ${t.object}</div><button class="complete-btn" onclick="completeTask('${t.id}')">✓</button></li>`).join('') || 'Geen taken.';
        }

        async function loadTasks() {
            let query = supabaseClient.from('inbox_items').select('*').eq('status', 'inbox');
            if (activeRoles.length) query = query.in('role', activeRoles);
            const { data } = await query;
            document.getElementById('list').innerHTML = (data || []).map(t => `<li><div><strong>${t.verb}</strong> ${t.object}</div><button class="complete-btn" onclick="completeTask('${t.id}')">✓</button></li>`).join('');
        }

        async function loadGoals(role) {
            const container = document.getElementById('goals-section');
            if (!role) { container.style.display = 'none'; return; }
            container.style.display = 'block';
            const { data } = await supabaseClient.from('goals').select('*').eq('role', role).eq('quarter', 1);
            document.getElementById('goals-list').innerHTML = (data || []).map(g => `
                <div class="goal-item" onclick="editGoal('${g.id}', '${g.title}', '${g.refinement || ''}')">
                    <strong>${g.title}</strong><br><small>${g.refinement || '+ focus'}</small>
                </div>`).join('') || `<p onclick="triggerNewGoal('${role}')" style="cursor:pointer; font-size:0.8rem;">+ Voeg doel toe</p>`;
        }

        async function loadSidebarProjects() {
            const { data } = await supabaseClient.from('projects').select('*');
            const filtered = (data || []).filter(p => activeRoles.length === 0 || activeRoles.includes(p.role));
            document.getElementById('projectTree').innerHTML = filtered.map(p => `<div class="goal-item" onclick="selectProject('${p.id}')">#${p.name}</div>`).join('');
        }

        // --- Acties ---
        async function addTask() {
            const input = document.getElementById('taskInput').value;
            const role = document.getElementById('roleSelect').value;
            if (!input) return;
            const parts = input.split(' ');
            await supabaseClient.from('inbox_items').insert({ verb: parts[0], object: parts.slice(1).join(' '), role: role, status: 'inbox' });
            document.getElementById('taskInput').value = '';
            refreshAll();
        }

        async function completeTask(id) {
            await supabaseClient.from('inbox_items').update({ status: 'done' }).eq('id', id);
            refreshAll();
        }

        function triggerNewGoal() {
            const role = activeRoles[0];
            if (!role) return alert("Kies eerst een thema");
            addNewGoal(role);
        }

        async function addNewGoal(role) {
            const title = prompt("Nieuw doel:");
            if (title) {
                await supabaseClient.from('goals').insert({ role, title, quarter: 1, year: 2026 });
                loadGoals(role);
            }
        }

        async function editGoal(id, title, refinement) {
            const res = prompt(`Verfijning voor ${title}:`, refinement);
            if (res !== null) {
                await supabaseClient.from('goals').update({ refinement: res }).eq('id', id);
                loadGoals(activeRoles[0]);
            }
        }

        // --- Role Tiles ---
        document.querySelectorAll('.role-tile').forEach(tile => {
            tile.addEventListener('click', function() {
                const role = this.dataset.role;
                activeRoles = activeRoles.includes(role) ? [] : [role];
                
                document.querySelectorAll('.role-tile').forEach(t => t.classList.toggle('active', activeRoles.includes(t.dataset.role)));
                
                loadGoals(activeRoles[0]);
                refreshAll();
                if (window.innerWidth < 768 && activeRoles.length > 0) { /* optioneel: sluit menu op mobiel na selectie */ }
            });
        });

        // Start
        refreshAll();
    </script>
</body>
</html>
