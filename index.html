<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cockpit - Rust & Focus</title>
    <style>
        :root {
    --gemini-bg: #f0f4f9;
    --gemini-card: #ffffff;
    --gemini-accent: #1a73e8;
    --text-main: #1f1f1f;
    --text-muted: #5f6368;
    --sidebar-width: 260px;
    --danger: #d93025;
}

body {
    font-family: 'Google Sans', 'SF Pro Text', sans-serif;
    margin: 0; background-color: var(--gemini-bg); color: var(--text-main);
    display: flex; height: 100vh; overflow: hidden;
}

/* Sidebar */
.sidebar {
    width: var(--sidebar-width);
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(0,0,0,0.05);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: transform 0.3s ease;
    z-index: 1000;
    overflow-y: auto;
}

@media (max-width: 768px) {
    .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
        width: 85vw;
        max-width: 320px;
    }
    .sidebar.active { transform: translateX(0); }
}

/* Sidebar overlay */
.sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 999;
}
.sidebar-overlay.active { display: block; }

.mobile-toggle {
    display: none;
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 4px;
}
@media (max-width: 768px) { .mobile-toggle { display: block; } }

.role-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}
.role-tile {
    background: var(--gemini-card);
    border: 1px solid #e3e3e3;
    border-radius: 16px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    font-size: 0.85rem;
}
.role-tile.active {
    background: #d3e3fd;
    border-color: var(--gemini-accent);
    font-weight: 500;
}

/* Main content */
.main-content {
    flex: 1;
    padding: 24px 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
}

@media (max-width: 768px) {
    .main-content { padding: 16px 12px; }
}

.prompt-box {
    background: var(--gemini-card);
    border-radius: 28px;
    padding: 16px 20px;
    box-shadow: 0 1px 6px rgba(32,33,36,0.1);
    width: 100%;
    max-width: 800px;
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* Dashboard grid */
.dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 800px;
}

@media (max-width: 768px) {
    .dashboard-grid { grid-template-columns: 1fr; }
}

.glass-card {
    background: var(--gemini-card);
    border-radius: 24px;
    padding: 20px;
    border: 1px solid #e3e3e3;
}

/* Week grid */
.week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 800px;
    margin-top: 24px;
    padding-bottom: 40px;
}

@media (max-width: 768px) {
    .week-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 480px) {
    .week-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

.week-day {
    background: white;
    border-radius: 12px;
    padding: 10px;
    min-height: 80px;
    border: 1px solid #e3e3e3;
    font-size: 0.75rem;
}
.week-day.today {
    border-color: var(--gemini-accent);
    background: #f8faff;
}
.week-day-title {
    font-weight: 600;
    margin-bottom: 6px;
    border-bottom: 1px solid #eee;
    padding-bottom: 4px;
}

.overdue { color: var(--danger); font-weight: bold; font-size: 0.7rem; margin-right: 5px; }
ul { list-style: none; padding: 0; margin: 0; }
li { padding: 10px 0; border-bottom: 1px solid #f1f3f4; display: flex; justify-content: space-between; align-items: center; }

.complete-btn {
    background: white;
    border: 1px solid #dadce0;
    color: var(--gemini-accent);
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    flex-shrink: 0;
}
.goal-item {
    background: #f8f9fa;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    border-left: 4px solid var(--gemini-accent);
    cursor: pointer;
}
.mail-btn {
    text-decoration: none;
    font-size: 1.1rem;
    margin-left: 10px;
    vertical-align: middle;
}
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMenu()"></div>
    <nav class="sidebar" id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-size: 1.5rem; font-weight: 600; color: var(--gemini-accent);">Cockpit</div>
            <button class="mobile-toggle" onclick="toggleMenu()">✕</button>
        </div>
        
        <div class="role-grid">
            <div class="role-tile" data-role="Gezondheid">🥗<br>Health</div>
            <div class="role-tile" data-role="Werk">💼<br>Werk</div>
            <div class="role-tile" data-role="Thuis">🏠<br>Thuis</div>
            <div class="role-tile" data-role="CommunitySocial">🌱<br>Sociaal</div>
        </div>

        <div id="goals-section" style="display: none;">
            <div style="font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 10px;">Ontwikkeldoelen</div>
            <div id="goals-list"></div>
            <button onclick="triggerNewGoal()" style="width:100%; border:1px dashed #ccc; background:none; padding:8px; border-radius:8px; cursor:pointer;">+ Nieuw Doel</button>
        </div>

        <div id="project-section">
            <div style="font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 10px;">Projecten</div>
            <div id="projectTree"></div>
            <div id="project-section">
                <div style="font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 10px;">Projecten</div>
                <div id="projectTree"></div>
                <button onclick="triggerNewProject()" style="width:100%; border:1px dashed #ccc; background:none; padding:8px; border-radius:8px; cursor:pointer; margin-top:4px;">+ Nieuw Project</button>
            </div>
        </div>
        <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: auto;">
          "Kom tot Mij, allen die vermoeid en belast zijn, en Ik zal jullie rust geven."
      </div>
    </nav>

    <main class="main-content">
        <div style="width: 100%; max-width: 800px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <button class="mobile-toggle" onclick="toggleMenu()">☰</button>
            <h1 style="margin:0;">Off we go, <span style="color: var(--gemini-accent);">Kris</span></h1>
            <div class="quote">Plan je acties bewust, vanuit het juiste.</div>
        </div>

        <div class="prompt-box">
            <div style="display:flex; align-items:center; gap:10px;">
                <input id="taskInput" placeholder="Wat ga je doen? (bv: Mailen naar #Elsbeth)" style="flex:1; border:none; outline:none; font-size:1.1rem;">
                <button onclick="addTask()" style="background:var(--gemini-accent); color:white; border:none; border-radius:50%; width:36px; height:36px; cursor:pointer;">➔</button>
            </div>
            <div style="display:flex; gap:10px; border-top:1px solid #eee; padding-top:10px;">
                <select id="roleSelect" style="border-radius:15px; border:1px solid #eee; padding:5px 10px; font-size: 0.8rem;">
                    <option value="Werk">Werk</option>
                    <option value="Thuis">Thuis</option>
                    <option value="Gezondheid">Health</option>
                    <option value="CommunitySocial">Sociaal</option>
                </select>
                <input id="dateInput" placeholder="Wanneer? (ma, morgen)" style="border-radius:15px; border:1px solid #eee; padding:5px 10px; flex:1; font-size: 0.8rem;">
                <input id="linkInput" placeholder="🔗 Spark link" style="border-radius:15px; border:1px solid #eee; padding:5px 10px; flex:1.5; font-size: 0.8rem;">
            </div>
        </div>

        <div class="dashboard-grid">
            <section class="glass-card">
                <h2>Vandaag ✨</h2>
                <ul id="today-list"></ul>
            </section>
            <section class="glass-card">
                <h2>Inbox 📥</h2>
                <ul id="inbox-list"></ul>
            </section>
        </div>

        <h2 style="width: 100%; max-width: 800px; margin-top: 40px; font-size: 1rem; color: var(--text-muted);">Deze Week</h2>
        <div id="week-grid" class="week-grid"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const supabaseClient = supabase.createClient(
            "https://fgogcqowvnymnpuvxdee.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnb2djcW93dm55bW5wdXZ4ZGVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MTA1NTksImV4cCI6MjA4NjM4NjU1OX0.pQkqm6JOyv6mbxn-gl00HDCG0uahRziwhX3tcIaaqhA"
        );

        let activeRoles = [];

        function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('sidebar-overlay').classList.toggle('active');
}
        function formatDateLocalISO(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function parseHumanDate(text) {
            if (!text) return null;
            const val = text.toLowerCase().trim();
            const d = new Date(); d.setHours(0,0,0,0);
            if (val === 'morgen') d.setDate(d.getDate() + 1);
            if (val === 'vandaag') return d;
            const days = {ma:1,maandag:1,di:2,dinsdag:2,wo:3,woensdag:3,do:4,donderdag:4,vr:5,vrijdag:5,za:6,zaterdag:6,zo:0,zondag:0};
            if (days[val] !== undefined) {
                const target = days[val]; const current = d.getDay();
                let diff = (target - current + 7) % 7;
                if (diff === 0) diff = 7; d.setDate(d.getDate() + diff);
            }
            return d;
        }

        async function manageTask(id, currentVerb, currentObject, currentUrl) {
    const action = prompt(`Taak: "${currentVerb} ${currentObject}"\n1: Tekst aanpassen | 2: Morgen | 3: Datum kiezen | 4: Terug naar Inbox | 5: Koppel aan doel | 6: Koppel aan project`, "1");
    if (action === "1") {
        const t = prompt("Nieuwe tekst:", `${currentVerb} ${currentObject}`);
        if (t) { const p = t.split(' '); await supabaseClient.from('tasks').update({ verb: p[0], object: p.slice(1).join(' ') }).eq('id', id); }
    } else if (action === "2") {
        const m = new Date(); m.setDate(m.getDate() + 1);
        await supabaseClient.from('tasks').update({ planned_for: formatDateLocalISO(m), status: 'planned' }).eq('id', id);
    } else if (action === "3") {
        const d = parseHumanDate(prompt("Nieuwe datum:"));
        if (d) await supabaseClient.from('tasks').update({ planned_for: formatDateLocalISO(d), status: 'planned' }).eq('id', id);
    } else if (action === "4") {
        await supabaseClient.from('tasks').update({ status: 'inbox', planned_for: null }).eq('id', id);
    } else if (action === "5") {
        const { data: goals } = await supabaseClient.from('goals').select('*');
        const opties = (goals || []).map((g, i) => `${i+1}: ${g.title}`).join('\n');
        const keuze = parseInt(prompt("Koppel aan:\n" + opties)) - 1;
        if (goals[keuze]) await supabaseClient.from('tasks').update({ goal_id: goals[keuze].id }).eq('id', id);
    } else if (action === "6") {
        const { data: projects } = await supabaseClient.from('projects').select('*').order('name');
        const opties = (projects || []).map((p, i) => `${i+1}: ${p.name}`).join('\n');
        const keuze = parseInt(prompt("Koppel aan project:\n" + opties)) - 1;
        if (projects[keuze]) await supabaseClient.from('tasks').update({ project_id: projects[keuze].id }).eq('id', id);
    }
    refreshAll();
        }
        

        async function loadTodayTasks() {
            const today = formatDateLocalISO(new Date());
            const { data } = await supabaseClient.from('tasks').select('*').lte('planned_for', today).neq('status', 'done');
            document.getElementById('today-list').innerHTML = (data || []).map(t => `
                <li>
                    <div style="cursor:pointer; flex:1;" onclick="manageTask('${t.id}', '${t.verb}', '${t.object}', '${t.source_url}')">
                        ${t.planned_for < today ? '<span class="overdue">OVER TIJD</span>' : ''}
                        <strong>${t.verb}</strong> ${t.object}
                        ${t.source_url ? `<a href="${t.source_url}" target="_blank" class="mail-btn" onclick="event.stopPropagation()">✉️</a>` : ''}
                    </div>
                    <button class="complete-btn" onclick="completeTask('${t.id}')">✓</button>
                </li>`).join('') || 'Klaar voor vandaag!';
        }

        async function loadInbox() {
            let q = supabaseClient.from('tasks').select('*').eq('status', 'inbox');
            if (activeRoles.length) q = q.in('role', activeRoles);
            const { data } = await q;
            document.getElementById('inbox-list').innerHTML = (data || []).map(t => `
                <li>
                    <div style="cursor:pointer; flex:1;" onclick="manageTask('${t.id}', '${t.verb}', '${t.object}', '${t.source_url}')">
                        <strong>${t.verb}</strong> ${t.object}
                        ${t.source_url ? `<a href="${t.source_url}" target="_blank" class="mail-btn" onclick="event.stopPropagation()">✉️</a>` : ''}
                    </div>
                    <button class="complete-btn" onclick="completeTask('${t.id}')">✓</button>
                </li>`).join('');
        }

        async function loadWeekTasks() {
    const grid = document.getElementById('week-grid');
    grid.innerHTML = '';

    const today = new Date();
    const startOfWeek = new Date(today);
    startOfWeek.setDate(today.getDate() - (today.getDay() === 0 ? 6 : today.getDay() - 1));
    
    const endOfWeek = new Date(startOfWeek);
    endOfWeek.setDate(startOfWeek.getDate() + 6);

    // ÉÉN call voor de hele week
    const { data } = await supabaseClient
        .from('tasks')
        .select('*')
        .gte('planned_for', formatDateLocalISO(startOfWeek))
        .lte('planned_for', formatDateLocalISO(endOfWeek))
        .neq('status', 'done');

    // Groepeer taken per datum in een Map
    const tasksByDay = {};
    (data || []).forEach(t => {
        if (!tasksByDay[t.planned_for]) tasksByDay[t.planned_for] = [];
        tasksByDay[t.planned_for].push(t);
    });

    // Bouw de grid
    for (let i = 0; i < 7; i++) {
        const d = new Date(startOfWeek);
        d.setDate(startOfWeek.getDate() + i);
        const iso = formatDateLocalISO(d);

        const div = document.createElement('div');
        div.className = `week-day ${iso === formatDateLocalISO(today) ? 'today' : ''}`;
        
        const dayTasks = tasksByDay[iso] || [];
        div.innerHTML = `
            <div class="week-day-title">
                ${d.toLocaleDateString('nl-NL', { weekday: 'short', day: 'numeric' })}
            </div>
            ${dayTasks.map(t => `
                <div style="font-size:0.7rem; margin-bottom:4px; cursor:pointer;" 
                     onclick="manageTask('${t.id}','${t.verb}','${t.object}','${t.source_url}')">
                    • ${t.verb} ${t.object}
                </div>
            `).join('')}
        `;
        grid.appendChild(div);
    }
}

        async function addTask() {
            const verb_obj = document.getElementById('taskInput').value;
            const role = document.getElementById('roleSelect').value;
            const date = parseHumanDate(document.getElementById('dateInput').value);
            const url = document.getElementById('linkInput').value;
            if (!verb_obj) return;
            const p = verb_obj.split(' ');
            await supabaseClient.from('tasks').insert({
                verb: p[0], object: p.slice(1).join(' '), role: role,
                status: date ? 'planned' : 'inbox', planned_for: date ? formatDateLocalISO(date) : null,
                source_url: url || null
            });
            document.getElementById('taskInput').value = ''; document.getElementById('dateInput').value = ''; document.getElementById('linkInput').value = '';
            refreshAll();
        }

        async function loadGoals(role) {
    const section = document.getElementById('goals-section');
    if (!role) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    const { data } = await supabaseClient.from('goals').select('*').eq('role', role).eq('quarter', 1);
    document.getElementById('goals-list').innerHTML = (data || []).map(g => `
        <div class="goal-item" id="goal-${g.id}" onclick="toggleGoalTasks('${g.id}', '${g.title}')">
            <strong>${g.title}</strong>
            <small style="display:block; color: var(--text-muted)">${g.refinement || '+ focus'}</small>
            <div id="goal-tasks-${g.id}" style="display:none; margin-top:8px;"></div>
        </div>
    `).join('');
}
async function toggleGoalTasks(goalId, goalTitle) {
    const container = document.getElementById(`goal-tasks-${goalId}`);
    if (container.style.display === 'block') { container.style.display = 'none'; return; }
    container.style.display = 'block';

    const { data } = await supabaseClient
        .from('tasks')
        .select('*')
        .eq('goal_id', goalId)
        .neq('status', 'done');

    container.innerHTML = `
        ${(data || []).map(t => `
            <div style="font-size:0.75rem; padding:4px 0; border-bottom:1px solid #eee; cursor:pointer; display:flex; justify-content:space-between; align-items:center;"
                 onclick="event.stopPropagation(); manageTask('${t.id}','${t.verb}','${t.object}','${t.source_url || ''}')">
                <span>• ${t.verb} ${t.object}</span>
                <button onclick="event.stopPropagation(); completeTask('${t.id}')" 
                        style="background:white; border:1px solid #dadce0; color:var(--gemini-accent); width:22px; height:22px; border-radius:50%; cursor:pointer; font-size:0.65rem;">✓</button>
            </div>
        `).join('') || '<div style="font-size:0.75rem; color:var(--text-muted);">Nog geen taken.</div>'}
        <button onclick="event.stopPropagation(); addTaskToGoal('${goalId}', '${goalTitle}')"
                style="margin-top:8px; width:100%; border:1px dashed #ccc; background:none; padding:5px; border-radius:6px; cursor:pointer; font-size:0.75rem;">
            + Taak toevoegen
        </button>
    `;
}
async function addTaskToGoal(goalId, goalTitle) {
    const input = prompt(`Nieuwe taak voor "${goalTitle}":`);
    if (!input) return;
    const parts = input.split(' ');
    const date = parseHumanDate(prompt("Wanneer? (ma, morgen, vandaag — of leeg voor inbox)"));
    await supabaseClient.from('tasks').insert({
        verb: parts[0],
        object: parts.slice(1).join(' '),
        role: activeRoles[0],
        goal_id: goalId,
        status: date ? 'planned' : 'inbox',
        planned_for: date ? formatDateLocalISO(date) : null
    });
    toggleGoalTasks(goalId, goalTitle);
    refreshAll();
}

async function loadSidebarProjects() {
    const { data: projects } = await supabaseClient
        .from('projects')
        .select('*')
        .order('name');

    const filtered = (projects || []).filter(p =>
        !activeRoles.length || activeRoles.includes(p.role)
    );

    // Groepeer: projecten onder een doel, en losse projecten
    const underGoal = filtered.filter(p => p.goal_id);
    const standalone = filtered.filter(p => !p.goal_id);

    document.getElementById('projectTree').innerHTML = `
        ${standalone.map(p => renderProjectTile(p)).join('')}
    `;

    // Plak projecten die onder een doel hangen, in het goal-blokje
    underGoal.forEach(p => {
        const goalContainer = document.getElementById(`goal-tasks-${p.goal_id}`);
        if (goalContainer && goalContainer.style.display === 'block') {
            const existing = document.getElementById(`project-tile-${p.id}`);
            if (!existing) {
                goalContainer.insertAdjacentHTML('beforeend', renderProjectTile(p, true));
            }
        }
    });
}
async function triggerNewProject() {
    const name = prompt("Naam van het nieuwe project:");
    if (!name) return;

    // Focusgebied: actief of zelf kiezen
    let role = activeRoles[0];
    if (!role) {
        const keuze = prompt("Focusgebied:\n1: Werk\n2: Thuis\n3: Gezondheid\n4: Sociaal");
        const rollen = { '1': 'Werk', '2': 'Thuis', '3': 'Gezondheid', '4': 'CommunitySocial' };
        role = rollen[keuze] || null;
    }

    // Optioneel koppelen aan ontwikkeldoel
    let goal_id = null;
    if (role) {
        const { data: goals } = await supabaseClient.from('goals').select('*').eq('role', role);
        if (goals && goals.length > 0) {
            const opties = goals.map((g, i) => `${i+1}: ${g.title}`).join('\n');
            const keuze = prompt(`Koppelen aan ontwikkeldoel? (leeg = geen)\n${opties}`);
            if (keuze) {
                const idx = parseInt(keuze) - 1;
                if (goals[idx]) goal_id = goals[idx].id;
            }
        }
    }

    const { error } = await supabaseClient.from('projects').insert({
        name,
        role: role || null,
        goal_id: goal_id || null
    });

    if (error) { console.error('project insert error:', error); return; }
    loadSidebarProjects();
}
function renderProjectTile(p, compact = false) {
    return `
        <div id="project-tile-${p.id}"
             class="goal-item"
             style="border-left-color: #a8c7fa; cursor:pointer; ${compact ? 'margin-left:8px;' : ''}"
             onclick="toggleProjectTasks('${p.id}', '${p.name}', '${p.role || ''}')">
            <strong>${roleIcon(p.role)} ${p.name}</strong>
            <div id="project-tasks-${p.id}" style="display:none; margin-top:8px;"></div>
        </div>
    `;
}
async function toggleProjectTasks(projectId, projectName, role) {
    const container = document.getElementById(`project-tasks-${projectId}`);
    if (container.style.display === 'block') { container.style.display = 'none'; return; }
    container.style.display = 'block';

    const { data } = await supabaseClient
        .from('tasks')
        .select('*')
        .eq('project_id', projectId)
        .neq('status', 'done');

    container.innerHTML = `
        ${(data || []).map(t => `
            <div style="font-size:0.75rem; padding:4px 0; border-bottom:1px solid #eee; cursor:pointer; display:flex; justify-content:space-between; align-items:center;"
                 onclick="event.stopPropagation(); manageTask('${t.id}','${t.verb}','${t.object}','${t.source_url || ''}')">
                <span>• ${t.verb} ${t.object}</span>
                <button onclick="event.stopPropagation(); completeTask('${t.id}')"
                        style="background:white; border:1px solid #dadce0; color:var(--gemini-accent); width:22px; height:22px; border-radius:50%; cursor:pointer; font-size:0.65rem;">✓</button>
            </div>
        `).join('') || '<div style="font-size:0.75rem; color:var(--text-muted);">Nog geen taken.</div>'}
        <button onclick="event.stopPropagation(); addTaskToProject('${projectId}', '${projectName}', '${role}')"
                style="margin-top:8px; width:100%; border:1px dashed #ccc; background:none; padding:5px; border-radius:6px; cursor:pointer; font-size:0.75rem;">
            + Taak toevoegen
        </button>
    `;
}
function roleIcon(role) {
    const icons = {
        'Werk': '💼',
        'Thuis': '🏠',
        'Gezondheid': '🥗',
        'CommunitySocial': '🌱'
    };
    return icons[role] || '📁';
}
async function addTaskToProject(projectId, projectName, role) {
    const input = prompt(`Nieuwe taak voor "#${projectName}":`);
    if (!input) return;
    const parts = input.split(' ');
    const date = parseHumanDate(prompt("Wanneer? (ma, morgen, vandaag — of leeg voor inbox)"));

    const { error } = await supabaseClient.from('tasks').insert({
        verb: parts[0],
        object: parts.slice(1).join(' '),
        role: role || activeRoles[0] || null,
        project_id: projectId,
        status: date ? 'planned' : 'inbox',
        planned_for: date ? formatDateLocalISO(date) : null
    });

    if (error) { console.error('insert error:', error); return; }
    toggleProjectTasks(projectId, projectName, role);
    refreshAll();
}

        async function completeTask(id) { await supabaseClient.from('tasks').update({ status: 'done' }).eq('id', id); refreshAll(); }
        function refreshAll() { loadTodayTasks(); loadInbox(); loadWeekTasks(); loadSidebarProjects(); }
        function triggerNewGoal() {
            const r = activeRoles[0]; if (!r) return alert("Selecteer eerst een thema");
            const t = prompt("Nieuw doel voor " + r);
            if (t) supabaseClient.from('goals').insert({ role: r, title: t, quarter: 1, year: 2026 }).then(() => loadGoals(r));
        }
        async function editGoal(id, title, ref) {
            const r = prompt(`Focus voor ${title}:`, ref);
            if (r !== null) { await supabaseClient.from('goals').update({ refinement: r }).eq('id', id); loadGoals(activeRoles[0]); }
        }

        document.querySelectorAll('.role-tile').forEach(tile => {
            tile.addEventListener('click', function() {
                const r = this.dataset.role; activeRoles = activeRoles.includes(r) ? [] : [r];
                document.querySelectorAll('.role-tile').forEach(t => t.classList.toggle('active', activeRoles.includes(t.dataset.role)));
                loadGoals(activeRoles[0]); refreshAll();
            });
        });

        refreshAll();
    </script>
</body>
</html>
