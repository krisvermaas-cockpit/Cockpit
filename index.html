<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cockpit - Rust & Focus</title>
    <style>
        :root {
            --gemini-bg: #f0f4f9;
            --gemini-card: #ffffff;
            --gemini-accent: #1a73e8;
            --text-main: #1f1f1f;
            --text-muted: #5f6368;
            --sidebar-width: 260px;
            --danger: #d93025;
        }

        body {
            font-family: 'Google Sans', 'SF Pro Text', sans-serif;
            margin: 0;
            background-color: var(--gemini-bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0,0,0,0.05);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .week-grid { grid-template-columns: 1fr !important; }
        }

        .mobile-toggle { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        @media (max-width: 768px) { .mobile-toggle { display: block; } }

        .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .role-tile {
            background: var(--gemini-card); border: 1px solid #e3e3e3; border-radius: 16px;
            padding: 12px; text-align: center; cursor: pointer; font-size: 0.85rem;
        }
        .role-tile.active { background: #d3e3fd; border-color: var(--gemini-accent); font-weight: 500; }

        /* Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        
        .prompt-box {
            background: var(--gemini-card); border-radius: 28px; padding: 16px 24px;
            box-shadow: 0 1px 6px rgba(32,33,36,0.1); width: 100%; max-width: 800px;
            margin-bottom: 30px;
        }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; width: 100%; max-width: 800px; }
        .glass-card { background: var(--gemini-card); border-radius: 24px; padding: 24px; border: 1px solid #e3e3e3; }
        
        /* Week Grid */
        .week-grid { 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; 
            width: 100%; max-width: 800px; margin-top: 40px; padding-bottom: 40px;
        }
        .week-day { background: white; border-radius: 12px; padding: 10px; min-height: 120px; border: 1px solid #e3e3e3; font-size: 0.75rem; }
        .week-day.today { border-color: var(--gemini-accent); background: #f8faff; }
        .week-day-title { font-weight: 600; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }

        .overdue { color: var(--danger); font-weight: bold; font-size: 0.7rem; margin-right: 5px; }
        
        ul { list-style: none; padding: 0; }
        li { padding: 10px 0; border-bottom: 1px solid #f1f3f4; display: flex; justify-content: space-between; align-items: center; }
        
        .complete-btn {
            background: white; border: 1px solid #dadce0; color: var(--gemini-accent);
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
        }
        
        .goal-item { background: #f8f9fa; padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid var(--gemini-accent); cursor: pointer; }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-size: 1.5rem; font-weight: 600; color: var(--gemini-accent);">Cockpit</div>
            <button class="mobile-toggle" onclick="toggleMenu()">✕</button>
        </div>
        
        <div class="role-grid">
            <div class="role-tile" data-role="Gezondheid">🥗<br>Health</div>
            <div class="role-tile" data-role="Werk">💼<br>Werk</div>
            <div class="role-tile" data-role="Thuis">🏠<br>Thuis</div>
            <div class="role-tile" data-role="CommunitySocial">🌱<br>Sociaal</div>
        </div>

        <div id="goals-section" style="display: none;">
            <div style="font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 10px;">Ontwikkeldoelen</div>
            <div id="goals-list"></div>
            <button onclick="triggerNewGoal()" style="width:100%; border:1px dashed #ccc; background:none; padding:8px; border-radius:8px; cursor:pointer;">+ Nieuw Doel</button>
        </div>

        <div id="project-section">
            <div style="font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 10px;">Projecten</div>
            <div id="projectTree"></div>
        </div>
    </nav>

    <main class="main-content">
        <div style="width: 100%; max-width: 800px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <button class="mobile-toggle" onclick="toggleMenu()" style="display: block;">☰</button>
            <h1 style="margin:0;">Vandaag, <span style="color: var(--gemini-accent);">Kris</span></h1>
        </div>

        <div class="prompt-box">
          <div style="display:flex; gap:10px; border-top:1px solid #eee; padding-top:10px;">
              <select id="roleSelect">...</select>
              <input id="dateInput" placeholder="Wanneer?">
              <input id="linkInput" placeholder="🔗 Plak link (Spark, etc)" style="border-radius:15px; border:1px solid #eee; padding:5px 10px; flex:1;">
          </div>
            <div style="display:flex; gap:10px; border-top:1px solid #eee; padding-top:10px;">
                <select id="roleSelect" style="border-radius:15px; border:1px solid #eee; padding:5px 10px;">
                    <option value="Werk">Werk</option>
                    <option value="Thuis">Thuis</option>
                    <option value="Gezondheid">Health</option>
                    <option value="CommunitySocial">Sociaal</option>
                </select>
                <input id="dateInput" placeholder="Wanneer? (morgen, ma)" style="border-radius:15px; border:1px solid #eee; padding:5px 10px; flex:1;">
            </div>
        </div>

        <div class="dashboard-grid">
            <section class="glass-card">
                <h2>Vandaag ✨</h2>
                <ul id="today-list"></ul>
            </section>
            <section class="glass-card">
                <h2>Inbox (te plannen) 📥</h2>
                <ul id="inbox-list"></ul>
            </section>
        </div>

        <h2 style="width: 100%; max-width: 800px; margin-top: 40px; font-size: 1rem; color: var(--text-muted);">Deze Week</h2>
        <div id="week-grid" class="week-grid"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const supabaseClient = supabase.createClient(
            "https://fgogcqowvnymnpuvxdee.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnb2djcW93dm55bW5wdXZ4ZGVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MTA1NTksImV4cCI6MjA4NjM4NjU1OX0.pQkqm6JOyv6mbxn-gl00HDCG0uahRziwhX3tcIaaqhA"
        );

        let activeRoles = [];

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        function formatDateLocalISO(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function parseHumanDate(text) {
            if (!text) return null;
            const val = text.toLowerCase().trim();
            const d = new Date(); d.setHours(0,0,0,0);
            if (val === 'morgen') d.setDate(d.getDate() + 1);
            if (val === 'vandaag') return d;
            const days = {ma:1,maandag:1,di:2,dinsdag:2,wo:3,woensdag:3,do:4,donderdag:4,vr:5,vrijdag:5,za:6,zaterdag:6,zo:0,zondag:0};
            if (days[val] !== undefined) {
                const target = days[val];
                const current = d.getDay();
                let diff = (target - current + 7) % 7;
                if (diff === 0) diff = 7;
                d.setDate(d.getDate() + diff);
            }
            return d;
        }

// --- Nieuwe Edit & Verplaats Functie ---
async function manageTask(id, currentVerb, currentObject, currentDate) {
    const action = prompt(
        `Taak: "${currentVerb} ${currentObject}"\n\n` +
        `Wat wil je doen?\n` +
        `1. Tekst aanpassen\n` +
        `2. Verplaatsen naar Morgen\n` +
        `3. Verplaatsen naar Datum (bv. 'ma' of '2026-03-01')\n` +
        `4. Terug naar Inbox`, 
        "1"
    );

    if (action === "1") {
        const newText = prompt("Nieuwe tekst (Werkwoord Object):", `${currentVerb} ${currentObject}`);
        if (newText) {
            const parts = newText.split(' ');
            await supabaseClient.from('inbox_items').update({ 
                verb: parts[0], 
                object: parts.slice(1).join(' ') 
            }).eq('id', id);
        }
    } else if (action === "2") {
        const morgen = new Date();
        morgen.setDate(morgen.getDate() + 1);
        await supabaseClient.from('inbox_items').update({ 
            planned_for: formatDateLocalISO(morgen),
            status: 'planned'
        }).eq('id', id);
    } else if (action === "3") {
        const newDateText = prompt("Nieuwe datum (vandaag, morgen, ma, di...):");
        const parsed = parseHumanDate(newDateText);
        if (parsed) {
            await supabaseClient.from('inbox_items').update({ 
                planned_for: formatDateLocalISO(parsed),
                status: 'planned'
            }).eq('id', id);
        }
    } else if (action === "4") {
        await supabaseClient.from('inbox_items').update({ 
            status: 'inbox', 
            planned_for: null 
        }).eq('id', id);
    }
    refreshAll();
}

async function loadTodayTasks() {
    const todayISO = formatDateLocalISO(new Date());
    const { data } = await supabaseClient.from('inbox_items').select('*').lte('planned_for', todayISO).neq('status', 'done');
    document.getElementById('today-list').innerHTML = (data || []).map(t => {
        const isOverdue = t.planned_for < todayISO;
        return `
      <li>
    <div style="cursor:pointer; flex:1;" onclick="manageTask(...)">
        <strong>${t.verb}</strong> ${t.object} ${linkButton}
    </div>
    <button class="complete-btn" onclick="completeTask('${t.id}')">✓</button>
</li>`;
    }).join('') || 'Geniet van je rust.';
}

        async function loadInbox() {
    let query = supabaseClient.from('inbox_items').select('*').eq('status', 'inbox');
    if (activeRoles.length) query = query.in('role', activeRoles);
    const { data } = await query;
    document.getElementById('inbox-list').innerHTML = (data || []).map(t => `
        <li>
    <div style="cursor:pointer; flex:1;" onclick="manageTask(...)">
        <strong>${t.verb}</strong> ${t.object} ${linkButton}
    </div>
    <button class="complete-btn" onclick="completeTask('${t.id}')">✓</button>
</li>`).join('');
 }

        async function loadWeekTasks() {
            const grid = document.getElementById('week-grid');
            grid.innerHTML = '';
            const today = new Date();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - (today.getDay() === 0 ? 6 : today.getDay() - 1));

            for (let i = 0; i < 7; i++) {
                const d = new Date(startOfWeek); d.setDate(startOfWeek.getDate() + i);
                const dateISO = formatDateLocalISO(d);
                const dayDiv = document.createElement('div');
                dayDiv.className = `week-day ${dateISO === formatDateLocalISO(today) ? 'today' : ''}`;
                dayDiv.innerHTML = `<div class="week-day-title">${d.toLocaleDateString('nl-NL', {weekday:'short', day:'numeric'})}</div><div id="w-${dateISO}"></div>`;
                grid.appendChild(dayDiv);

                const { data } = await supabaseClient.from('inbox_items').select('*').eq('planned_for', dateISO).neq('status', 'done');
                document.getElementById(`w-${dateISO}`).innerHTML = (data || []).map(t => `<div style="font-size:0.7rem; margin-bottom:4px;">• ${t.verb} ${t.object}</div>`).join('');
            }
        }

        async function loadGoals(role) {
            const section = document.getElementById('goals-section');
            if (!role) { section.style.display = 'none'; return; }
            section.style.display = 'block';
            const { data } = await supabaseClient.from('goals').select('*').eq('role', role).eq('quarter', 1);
            document.getElementById('goals-list').innerHTML = (data || []).map(g => `<div class="goal-item" onclick="editGoal('${g.id}','${g.title}','${g.refinement || ''}')"><strong>${g.title}</strong><br><small>${g.refinement || '+ focus'}</small></div>`).join('');
        }

        async function loadSidebarProjects() {
            const { data } = await supabaseClient.from('projects').select('*');
            document.getElementById('projectTree').innerHTML = (data || []).filter(p => !activeRoles.length || activeRoles.includes(p.role)).map(p => `<div class="goal-item" style="border-left-color:#ccc">#${p.name}</div>`).join('');
        }

        async function addTask() {
    const input = document.getElementById('taskInput').value;
    const role = document.getElementById('roleSelect').value;
    const dateStr = document.getElementById('dateInput').value;
    const linkInput = document.getElementById('linkInput'); // Voeg dit veld toe aan je HTML (zie hieronder)
    
    if (!input) return;
    const parts = input.split(' ');
    const plannedDate = parseHumanDate(dateStr);
    
    await supabaseClient.from('inbox_items').insert({ 
        verb: parts[0], 
        object: parts.slice(1).join(' '), 
        role: role, 
        status: plannedDate ? 'planned' : 'inbox',
        planned_for: plannedDate ? formatDateLocalISO(plannedDate) : null,
        source_url: linkInput ? linkInput.value : null // Sla de Spark link op
    });
    
    document.getElementById('taskInput').value = '';
    document.getElementById('dateInput').value = '';
    if(linkInput) linkInput.value = '';
    refreshAll();
}

        async function completeTask(id) {
            await supabaseClient.from('inbox_items').update({ status: 'done' }).eq('id', id);
            refreshAll();
        }

        function triggerNewGoal() {
            const role = activeRoles[0];
            if (!role) return alert("Selecteer eerst een thema (tegel)");
            const title = prompt("Nieuw doel voor " + role);
            if (title) supabaseClient.from('goals').insert({ role, title, quarter: 1, year: 2026 }).then(() => loadGoals(role));
        }

        async function editGoal(id, title, ref) {
            const newRef = prompt(`Verfijning voor ${title}:`, ref);
            if (newRef !== null) {
                await supabaseClient.from('goals').update({ refinement: newRef }).eq('id', id);
                loadGoals(activeRoles[0]);
            }
        }

        function refreshAll() { loadTodayTasks(); loadInbox(); loadWeekTasks(); loadSidebarProjects(); }

        document.querySelectorAll('.role-tile').forEach(tile => {
            tile.addEventListener('click', function() {
                const r = this.dataset.role;
                activeRoles = activeRoles.includes(r) ? [] : [r];
                document.querySelectorAll('.role-tile').forEach(t => t.classList.toggle('active', activeRoles.includes(t.dataset.role)));
                loadGoals(activeRoles[0]);
                refreshAll();
            });
        });

        refreshAll();
    </script>
</body>
</html>
